server:
  port: 8083

spring:
  application:
    name: application-service

  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 3000
        max-interval: 10000
        multiplier: 1.5
        
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/user_db}
    username: root
    password: smit
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: ${EUREKA_INSTANCE_HOSTNAME:application-service}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}
  folders:
    resumes: job-portal/resumes

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://zipkin:9411/api/v2/spans}

logging:
  file:
    name: logs/application-service.log

