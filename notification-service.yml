server:
  port: 8085

spring:
  application:
    name: notification-service
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 3000
        max-interval: 10000
        multiplier: 1.5
        
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: guest
    password: guest
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:placementlpu0@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:tvvqfgydttpugjql}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 60000
      cache-null-values: false

eureka:
  client:
    registry-fetch-interval-seconds: 10
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: ${EUREKA_INSTANCE_HOSTNAME:notification-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://zipkin:9411/api/v2/spans}

logging:
  file:
    name: logs/notification-service.log

